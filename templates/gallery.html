<!DOCTYPE html>
<html>
<head>
    <title>Photography Portfolio</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        /* Navbar */
        nav{
            background:#111;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-size:18px;
        }

        nav a:hover{
            color:#ffcc00;
        }


        /* Hero Section */
        .hero{
            height:400px;
            background:url("{{ url_for('static', filename='images/photo1.jpg') }}");
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            text-align:center;
        }

        .hero h1{
            font-size:45px;
            text-shadow:2px 2px 5px black;
        }


        /* Gallery */
        h2{
            text-align:center;
            margin-top:30px;
        }

        .gallery{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .gallery img{
            width:300px;
            height:220px;
            object-fit:cover;
            border-radius:15px;
            transition:0.3s;
        }

        .gallery img:hover{
            transform:scale(1.05);
        }


        /* About */
        .about{
            text-align:center;
            padding:30px;
            background:white;
        }


    </style>

</head>

<body>
    <nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/gallery">Gallery</a>
    <a href="/services">Services</a>
    <a href="/contact">Contact</a>
</nav>

<!-- Navbar -->




<!-- Hero -->

<div class="hero">

    <h1>
        Capturing Beautiful Moments 📸
    </h1>

</div>


<!-- Gallery -->

<h2 id="gallery">My Photography Gallery</h2>

<div class="gallery">

<img src="{{ url_for('static', filename='images/photo1.jpg') }}">

<img src="{{ url_for('static', filename='images/photo2.jpg') }}">

<img src="{{ url_for('static', filename='images/photo3.jpg') }}">

<img src="{{ url_for('static', filename='images/photo4.jpg') }}">

</div>


<!-- About -->

<div class="about" id="about">

<h2>About Me</h2>

<p>
I am a photographer who captures beautiful moments,
events and memories through my camera.
</p>

</div>


</body>
</html>
